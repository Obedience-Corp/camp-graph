name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up just
        uses: extractions/setup-just@v3

      - name: Lint
        run: just lint

      - name: Unit tests
        run: just test unit

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Fail if the repository is still private
        if: ${{ github.event.repository.private }}
        run: |
          echo "::error::camp-graph must be public before Homebrew and AUR consumers can install release assets."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up just
        uses: extractions/setup-just@v3

      - name: Validate release credentials
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          missing=0
          for name in HOMEBREW_TAP_GITHUB_TOKEN AUR_SSH_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required secret ${name}"
              missing=1
            fi
          done
          exit "${missing}"

      - name: Import AUR SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Check GoReleaser config
        run: just release check

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
