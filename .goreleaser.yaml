version: 2

before:
  hooks:
    - bash scripts/completions.sh

builds:
  - id: camp-graph-build
    main: ./cmd/camp-graph
    binary: camp-graph
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/Obedience-Corp/camp-graph/internal/version.Version={{.Version}}
      - -X github.com/Obedience-Corp/camp-graph/internal/version.Commit={{.Commit}}
      - -X github.com/Obedience-Corp/camp-graph/internal/version.BuildDate={{.Date}}

archives:
  - id: camp-graph
    ids:
      - camp-graph-build
    name_template: >-
      camp-graph-
      {{- .Version }}-
      {{- if eq .Os "darwin" }}macOS
      {{- else }}{{ .Os }}{{ end }}-
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - README.md
      - LICENSE
      - completions/*

aurs:
  - name: camp-graph-bin
    ids:
      - camp-graph
    homepage: "https://github.com/Obedience-Corp/camp-graph"
    description: "Knowledge graph visualization plugin for the camp CLI"
    maintainers:
      - "Obedience Corp <contact@obediencecorp.com>"
    license: "FSL-1.1-ALv2"
    private_key: "{{ .Env.AUR_SSH_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/camp-graph-bin.git"
    provides:
      - camp-graph
    conflicts:
      - camp-graph
    package: |-
      install -Dm755 "./camp-graph" "${pkgdir}/usr/bin/camp-graph"
      install -Dm644 "./LICENSE" "${pkgdir}/usr/share/licenses/camp-graph/LICENSE"
      install -Dm644 "./completions/camp-graph.bash" "${pkgdir}/usr/share/bash-completion/completions/camp-graph"
      install -Dm644 "./completions/_camp-graph" "${pkgdir}/usr/share/zsh/site-functions/_camp-graph"
      install -Dm644 "./completions/camp-graph.fish" "${pkgdir}/usr/share/fish/vendor_completions.d/camp-graph.fish"
    commit_msg_template: "Update to {{ .Tag }}"

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

homebrew_casks:
  - repository:
      owner: Obedience-Corp
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"

    name: camp-graph
    ids:
      - camp-graph
    homepage: "https://github.com/Obedience-Corp/camp-graph"
    description: "Knowledge graph visualization plugin for the camp CLI"
    license: "FSL-1.1-ALv2"
    skip_upload: auto
    directory: Casks

    binaries:
      - camp-graph
    completions:
      bash: completions/camp-graph.bash
      zsh: completions/_camp-graph
      fish: completions/camp-graph.fish

    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/camp-graph"]
          end

    caveats: |
      camp discovers this plugin automatically once the binary is on your PATH:

        camp graph build

      Standalone completion activation:

        source <(camp-graph completion bash)
        source <(camp-graph completion zsh)
        camp-graph completion fish | source

release:
  github:
    owner: Obedience-Corp
    name: camp-graph

  prerelease: auto

  header: |
    ## camp-graph {{ .Tag }}

    Knowledge graph plugin release for `camp`.

  footer: |
    {{- if .PreviousTag }}
    **Full Changelog**: https://github.com/Obedience-Corp/camp-graph/compare/{{ .PreviousTag }}...{{ .Tag }}
    {{- end }}

    ## Installation

    | Platform | Command |
    |----------|---------|
    | Homebrew | `brew install --cask Obedience-Corp/tap/camp-graph` |
    | Arch Linux | `yay -S camp-graph-bin` |
    | Manual | Download the matching archive from GitHub Releases |
